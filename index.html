<!DOCTYPE html>
<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>政务 App 登录界面 - 中文版</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "PingFang SC", "Microsoft YaHei", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Public Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .soft-gradient {
            background: linear-gradient(135deg, #e0f0ff 0%, #ffffff 100%);
        }
        .dark .soft-gradient {
            background: linear-gradient(135deg, #101922 0%, #1a2a3a 100%);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#0d141b] dark:text-slate-100 antialiased font-display">
<div class="relative flex min-h-screen w-full flex-col soft-gradient overflow-x-hidden p-6">
<div class="flex flex-col items-center justify-center pt-12 pb-8">
<div class="bg-primary/10 dark:bg-primary/20 p-4 rounded-2xl mb-6 shadow-sm">
<span class="material-symbols-outlined text-primary text-5xl">
                    account_balance
                </span>
</div>
<h2 class="text-sm font-semibold tracking-widest uppercase text-primary/80">政务通 移动版</h2>
</div>
<div class="mb-10 text-center px-4">
<h1 class="text-[#0d141b] dark:text-white text-4xl font-bold leading-tight tracking-tight">欢迎回来</h1>
<p class="text-slate-500 dark:text-slate-400 text-base mt-2">登录以安全地访问您的数字化政务服务。</p>
</div>
<div class="flex flex-col gap-5 max-w-md mx-auto w-full">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">身份证号或手机号</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                        person
                    </span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border-none bg-white dark:bg-slate-800 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07)] focus:ring-2 focus:ring-primary text-base placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="请输入您的账号" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">密码</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">忘记密码？</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                        lock
                    </span>
<input class="w-full h-14 pl-12 pr-12 rounded-xl border-none bg-white dark:bg-slate-800 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07)] focus:ring-2 focus:ring-primary text-base placeholder:text-slate-400 transition-all" placeholder="请输入密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
                登录
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="relative my-6 text-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<span class="relative px-4 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm rounded-full text-xs font-medium text-slate-400 uppercase tracking-widest">快速访问</span>
</div>
<div class="flex gap-4 items-center justify-center mb-10">
<button class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 w-1/2 active:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl">face</span>
<span class="text-xs font-bold text-slate-600 dark:text-slate-300">面容识别</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 w-1/2 active:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl">
                        sms
                    </span>
<span class="text-xs font-bold text-slate-600 dark:text-slate-300">短信验证码</span>
</button>
</div>
</div>
<div class="mt-auto pb-6 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                还没有账号？ 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">立即注册</a>
</p>
<div class="mt-8 flex justify-center gap-6 opacity-40">
<img class="h-6 grayscale object-contain" data-alt="Official government partnership logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDscazdea7nNxnORt2jh0cnksPWGTL4IbdadUI45OmAvJqeOB4gWouOnupogyjOZgyj1gqS-szETq37Mo_Hw2hOiIVRrWoEXvTwaonAnXyzWS5yjO8T7ejFltt71wXXtvxrDAH1j4eiC5DQ8D-OwCpBvD0Xkny4LMpAawmNLfBoU4JYMShbEI5_3CFFeaVdlDD5Mg421foKB0uI75ZV-wCO8AuGPpYOVXvLgkMDiNKWb4aMnEaKuoG68s05wUr4wGx4-ug_w63iypM"/>
</div>
</div>
</div>

</body></html>
